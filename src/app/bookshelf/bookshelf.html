<svg class="invisible absolute inset-0">
  <defs>
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="8" result="noise" />
      <feDiffuseLighting in="noise" lighting-color="white" surfaceScale="1" result="diffLight">
        <feDistantLight azimuth="45" elevation="35" />
      </feDiffuseLighting>
    </filter>
  </defs>
</svg>
<div role="list" class="flex flex-row justify-center space-x-4">
  <button
    *ngFor="let book of books; let index = index"
    role="listitem"
    (click)="setFocusedIndex(index)"
    [ngClass]="[
      'flex shrink-0 flex-row items-center outline-none',
      focusedIndex !== index ? 'hover:-translate-y-4 focus-visible:-translate-y-4' : '',
      focusedIndex === index ? 'basis-60' : 'basis-12',
      'transition-all duration-500 ease will-change-auto'
    ]"
    [style.perspective]="'1000px'"
    [style.WebkitPerspective]="'1000px'"
    [attr.key]="book.title"
  >
    <div
      [ngClass]="[
        'z-50 h-full w-[44px] shrink-0 origin-right py-4 brightness-[0.80] contrast-[2.00]',
        'transition-all duration-500 ease will-change-auto'
      ]"
      [style.backgroundColor]="book.spineBackgroundColor"
      [style.color]="book.spineForegroundColor"
      [style.transformStyle]="'preserve-3d'"
      [style.transform]="
        'translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(' +
        (focusedIndex === index ? '-60deg' : '0deg') +
        ') rotateZ(0deg) skew(0deg, 0deg)'
      "
    >
      <span
        aria-hidden="true"
        class="pointer-events-none fixed top-0 left-0 z-50 h-full w-full opacity-40"
        style="filter: url(#paper);"
      ></span>
      <h2 class="text-md m-auto font-medium" style="writing-mode: vertical-lr;">
        {{ book.title }}
      </h2>
    </div>
    <div
      [ngClass]="[
        'relative z-10 h-72 shrink-0 origin-left overflow-hidden border-gray-900 brightness-[0.80] contrast-[2.00]',
        'transition-all duration-500 ease will-change-auto'
      ]"
      [style.transformStyle]="'preserve-3d'"
      [style.transform]="
        'translate3d(0px, 0px, 0px) scale3d(1, 1, 1) rotateX(0deg) rotateY(' +
        (focusedIndex === index ? '30deg' : '90deg') +
        ') rotateZ(0deg) skew(0deg, 0deg)'
      "
    >
      <span
        aria-hidden="true"
        class="pointer-events-none fixed top-0 right-0 z-50 h-full w-full opacity-40"
        style="filter: url(#paper);"
      ></span>
      <span
        aria-hidden="true"
        class="pointer-events-none absolute top-0 left-0 z-50 h-full w-full"
        [style.background]="
          'linear-gradient(to right, rgba(255, 255, 255, 0) 2px, rgba(255, 255, 255, 0.5) 3px, rgba(255, 255, 255, 0.25) 4px, rgba(255, 255, 255, 0.25) 6px, transparent 7px, transparent 9px, rgba(255, 255, 255, 0.25) 9px, transparent 12px)'
        "
      ></span>
      <img [src]="book.coverUrl" [alt]="book.title" class="h-full w-48 bg-cover transition-all duration-500 ease will-change-auto" />
    </div>
  </button>
</div>
